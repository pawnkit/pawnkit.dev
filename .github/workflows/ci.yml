name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PAWNKIT_SOURCE_ROOT: sources

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: pawnkit/pawnkit-spec
          ref: ab0c7545c91626ff81b24a33654c1eb2bb552045
          path: sources/pawnkit-spec
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: pawnkit/pawn-api
          ref: v0.1.0
          path: sources/pawn-api
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: pawnkit/pawnlint
          ref: v1.0.2
          path: sources/pawnlint
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - if: runner.os != 'Windows'
        run: CGO_ENABLED=1 go test -race -shuffle=on ./...

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          test -z "$(gofmt -l .)"
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
      - run: go tool govulncheck ./...
      - run: node --check internal/site/static/search.js
